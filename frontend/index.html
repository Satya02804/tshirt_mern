<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/png" href="/t-shirt.png" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
   <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400..900;1,400..900&family=SN+Pro:ital,wght@0,200..900;1,200..900&display=swap" rel="stylesheet">
    <title>T-shirt Store</title>
  </head>
  <body>
    <div id="root"></div>
    <script>
      (function() {
        const originalInfo = console.info;
        console.info = function(...args) {
          if (typeof args[0] === 'string' && args[0].includes('Download the React DevTools')) {
            return;
          }
          originalInfo.apply(console, args);
        };
      })();
    </script>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
